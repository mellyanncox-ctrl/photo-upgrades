<style>
  :root {
    --cream: #F0EDE6;
    --dark: #1C1B19;
    --mid: #4A4844;
    --accent: #C8A96E;
    --warm: #E8DFD0;
    --red: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--dark);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(200,169,110,0.04) 40px,
      rgba(200,169,110,0.04) 41px
    );
  }

  .brand {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    position: relative;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    color: var(--cream);
    letter-spacing: 0.04em;
    line-height: 0.9;
    margin-bottom: 0.5rem;
    position: relative;
  }

  .header-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 1.5rem;
    position: relative;
    transition: opacity 0.2s;
  }

  header p {
    color: rgba(240,237,230,0.5);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    max-width: 400px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── PACK SWITCHER ─── */
  .pack-bar {
    background: var(--dark);
    border-top: 1px solid rgba(200,169,110,0.15);
    padding: 0 2rem;
    display: flex;
    justify-content: center;
    gap: 0;
  }

  .pack-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.4);
    padding: 0.9rem 1.6rem;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pack-tab:hover { color: rgba(240,237,230,0.75); }

  .pack-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  /* ─── EXPORT BAR ─── */
  .export-bar {
    background: var(--warm);
    border-bottom: 1px solid rgba(28,27,25,0.1);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(28,27,25,0.08);
  }

  .export-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    font-weight: 500;
    white-space: nowrap;
  }

  .export-options {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .export-btn {
    padding: 0.4rem 0.9rem;
    border: 1.5px solid rgba(28,27,25,0.2);
    background: transparent;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.2s;
  }

  .export-btn:hover { border-color: var(--accent); color: var(--dark); }
  .export-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--cream);
  }

  .export-hint {
    font-size: 0.7rem;
    color: rgba(74,72,68,0.5);
    margin-left: auto;
    font-style: italic;
  }

  /* ─── MAIN ─── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* ─── SECTION TITLES ─── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 3.5rem 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,169,110,0.3);
  }

  /* ─── HOW IT WORKS ─── */
  .how-it-works {
    background: var(--dark);
    border-radius: 3px;
    padding: 2.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2rem;
    margin-bottom: 1rem;
  }

  .step { display: flex; flex-direction: column; gap: 0.6rem; }

  .step-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    line-height: 1;
    opacity: 0.6;
  }

  .step-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--cream);
  }

  .step-text {
    font-size: 0.78rem;
    line-height: 1.6;
    color: rgba(240,237,230,0.5);
  }

  /* ─── PROMPT GRID ─── */
  .prompt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  /* ─── PROMPT CARDS ─── */
  .prompt-card {
    background: white;
    border: 1px solid rgba(28,27,25,0.08);
    border-radius: 3px;
    overflow: hidden;
    transition: box-shadow 0.3s, transform 0.2s;
    position: relative;
  }

  .prompt-card:hover {
    box-shadow: 0 8px 40px rgba(28,27,25,0.12);
    transform: translateY(-2px);
  }

  .card-header {
    padding: 1.4rem 1.4rem 1rem;
    border-bottom: 1px solid rgba(28,27,25,0.06);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--dark);
  }

  .card-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--mid);
    margin-top: 0.2rem;
  }

  .card-tag {
    background: var(--warm);
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-body { padding: 1rem 1.4rem; }

  .prompt-preview {
    font-size: 0.78rem;
    line-height: 1.6;
    color: var(--mid);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  /* ─── HERO INPUT ─── */
  .hero-input-wrap { margin-bottom: 1rem; }

  .hero-input-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    display: block;
    margin-bottom: 0.4rem;
  }

  .hero-input {
    width: 100%;
    padding: 0.55rem 0.8rem;
    border: 1.5px solid rgba(28,27,25,0.15);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }

  .hero-input:focus { border-color: var(--accent); background: white; }
  .hero-input::placeholder { color: rgba(74,72,68,0.4); }

  /* ─── COPY BUTTON ─── */
  .copy-btn {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .copy-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .copy-btn:hover::before { transform: translateX(0); }
  .copy-btn span { position: relative; z-index: 1; }
  .copy-btn svg { position: relative; z-index: 1; transition: transform 0.2s; }
  .copy-btn:hover svg { transform: scale(1.1); }
  .copy-btn.copied { background: #2D6A4F; }
  .copy-btn.copied::before { transform: translateX(0); background: #2D6A4F; }

  /* ─── EXPAND BUTTON ─── */
  .expand-btn {
    width: 100%;
    padding: 0.5rem;
    background: transparent;
    border: none;
    border-top: 1px solid rgba(28,27,25,0.06);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(74,72,68,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    transition: color 0.2s;
  }

  .expand-btn:hover { color: var(--dark); }
  .expand-btn svg { transition: transform 0.3s; }
  .expand-btn.open svg { transform: rotate(180deg); }

  .full-prompt {
    display: none;
    padding: 1rem 1.4rem;
    border-top: 1px solid rgba(28,27,25,0.06);
    background: rgba(240,237,230,0.5);
    font-size: 0.75rem;
    line-height: 1.7;
    color: var(--mid);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    max-height: 300px;
    overflow-y: auto;
  }

  .full-prompt::-webkit-scrollbar { width: 3px; }
  .full-prompt::-webkit-scrollbar-track { background: transparent; }
  .full-prompt::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark);
    color: var(--cream);
    padding: 0.8rem 1.5rem;
    border-radius: 2px;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    border-left: 3px solid var(--accent);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .export-bar { padding: 1rem; gap: 0.8rem; }
    .export-hint { display: none; }
    .how-it-works { padding: 1.5rem; }
    .pack-tab { padding: 0.9rem 1rem; font-size: 0.62rem; letter-spacing: 0.1em; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">the service edit</div>
  <h1>Hospitality<br>Photo Upgrade<br>Prompts</h1>
  <div class="header-subtitle" id="headerSubtitle">DSLR Natural</div>
  <p>Select a pack below — copy any prompt and paste into ChatGPT with your photo</p>
</header>

<div class="pack-bar">
  <button class="pack-tab active" data-pack="natural" onclick="switchPack('natural')">DSLR Natural</button>
  <button class="pack-tab" data-pack="flash" onclick="switchPack('flash')">DSLR Hard Flash</button>
  <button class="pack-tab" data-pack="hotel" onclick="switchPack('hotel')">Hotel Pack</button>
</div>

<div class="export-bar">
  <span class="export-label">Export for:</span>
  <div class="export-options" id="exportOptions">
    <button class="export-btn active" data-export="instagram">Instagram Post</button>
    <button class="export-btn" data-export="reel">Reel / Story</button>
    <button class="export-btn" data-export="ad">Ad (1:1)</button>
    <button class="export-btn" data-export="website">Website</button>
    <button class="export-btn" data-export="none">No Export</button>
  </div>
  <span class="export-hint">Export prompt auto-appended ↑</span>
</div>

<main>
  <div class="section-title">How It Works</div>
  <div class="how-it-works" id="howItWorks"></div>
  <div class="section-title" id="promptsTitle">Core Prompts</div>
  <div class="prompt-grid" id="promptGrid"></div>
</main>

<div class="toast" id="toast">✓ Prompt copied to clipboard</div>

<script>
const CONSISTENCY_BOOST = `

CONSISTENCY LOCK (APPLY TO ALL EDITS)
- Every single edit must produce a result that looks like the SAME physical photograph
- Same scene, same camera position, same framing, same crop
- No random variation between attempts — one stable optical result
- If AI attempts to "improve" the scene layout: REJECT and retry
- If AI alters any non-flash element: REJECT and retry`;

const EXPORT_PROMPTS = {
  natural: {
    instagram: "Export as 4:5 portrait (Instagram feed). Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    reel:      "Export as 9:16 vertical (Reel/Story). Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    ad:        "Export as 1:1. Leave clear negative space for ad text. Keep the hero subject slightly off-centre with safe margins. Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    website:   "Export as high-resolution website-ready files. Provide 16:9 (hero banner crop). Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    none: ""
  },
  flash: {
    instagram: "Export as 4:5 portrait (Instagram feed). Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    reel:      "Export as 9:16 vertical (Reel/Story). Export as a high-resolution editorial image with print-safe contrast and natural colour accuracy. No key details cut off.",
    ad:        "Export as 1:1. Leave clear negative space for ad text. Keep the hero subject slightly off-centre with safe margins.",
    website:   "Export as high-resolution website-ready files. Provide 16:9 (hero banner crop).",
    none: ""
  },
  hotel: {
    instagram: "EXPORT: Instagram post\nExport as 4:5 portrait (Instagram feed). Centre the hero subject and ensure it fills the frame. No key details cut off.",
    reel:      "EXPORT: Instagram Reel\nExport as 9:16 vertical (Reel/Story). Keep the hero subject inside the centre safe zone. Leave breathing room at top and bottom.",
    ad:        "EXPORT: Ad\nExport as 1:1. Leave clear negative space for ad text. Keep the hero subject slightly off-centre with safe margins.",
    website:   "EXPORT: Website\nExport as high-resolution website-ready file. Provide 16:9 (hero banner crop). Keep colour true-to-life and avoid heavy contrast.",
    none: ""
  }
};

const PACKS = {
  natural: {
    subtitle: "DSLR Natural",
    promptsTitle: "Core Prompts",
    steps: [
      { num: "01", title: "Take Your Photo",  text: "Shoot your food, drink, or venue photo as normal. Ensure it's in JPEG format." },
      { num: "02", title: "Open ChatGPT",     text: "Upload your image directly into the ChatGPT chat window." },
      { num: "03", title: "Copy a Prompt",    text: "Click the copy button below, fill in your hero product, then paste." },
      { num: "04", title: "Export",           text: "Select your export format above — it's automatically added to every prompt." },
    ],
    prompts: [
      {
        id: "nat-basic", title: "BASIC", subtitle: "The all-purpose foundation", tag: "Start here",
        hasHero: false,
        description: "Rework the uploaded image into a professional DSLR optical realism edit.",
        prompt: `Rework the uploaded image into a professional DSLR optical realism edit.
- Prioritise tack-sharp focus on the main subject.
- Add a subtle, natural optical background blur (bokeh) (lens-based only).
- The scene must remain 100% identical - no changes to objects, food, drinks, plates, cutlery, table, or background.
- This is an optical realism edit only (lens + sensor rendering), not a redesign.

NEGATIVE PROMPT (NON-NEGOTIABLE LOCKS)
ENVIRONMENT + SCENE LOCK (CRITICAL)
- Do NOT change the environment, location, background, surfaces, or setting
- Do NOT replace interiors, furniture, décor, plates, glassware, packaging, or props
- Do NOT change lighting direction, time-of-day feel, ambience, or mood
- Do NOT change colour temperature or overall natural light character
- Do NOT remove real mess, clutter, imperfections, or texture

SUBJECT IDENTITY LOCK
- Do NOT change the main subject in any way
- Do NOT alter shape, size, proportions, scale, angle, or placement
- Do NOT change colour, texture, material, branding, labels, logos, or typography
- Do NOT add/remove ingredients, components, garnish, liquid, steam, crumbs, etc.
- Do NOT "perfect", tidy, restyle, or beautify the subject

NO OBJECT CHANGES
- Do NOT add/remove objects, people, hands, utensils, plates, napkins, packaging, or background elements
- Do NOT invent new details
- Do NOT clone, patch, erase, fill, or regenerate any missing areas

NO RETOUCH / NO AI LOOK
- No stylising (no cinematic, film, moody grade, vintage filters unless requested)
- No CGI / 3D render look
- No illustration / cartoon / painterly styles
- No smoothing, retouching, reshaping, symmetry correction
- No whitening, fake "shine," plastic textures, or polish effects
- No HDR, no heavy contrast, no heavy saturation

NO FAKE DEPTH OF FIELD
- No cut-out edges / masking artefacts
- No haloing around subjects
- No pasted-on blur layers or artificial masking
- No over-sharpening or crunchy micro-contrast

ONLY ALLOWED CHANGES
- Lens optics only (true depth of field, natural bokeh falloff, focal rendering)
- Sensor rendering only (dynamic range, highlight roll-off, tonal subtlety, clean detail)
- Everything else must remain identical to the original image`,
      },
      {
        id: "nat-flatlay", title: "FLATLAY", subtitle: "90° overhead table spread", tag: "Top-down",
        hasHero: false,
        description: "Rework into a professional DSLR overhead flat-lay table spread (true top-down food editorial).",
        prompt: `Rework the uploaded image into a professional DSLR overhead flat-lay table spread (true top-down food editorial).
Reframe to a natural 90° top-down perspective with subtle, realistic perspective correction only.
Maintain clean sharp focus across key elements, with subtle optical depth where appropriate (lens-based only).
Preserve true-to-life colour, clean highlights, and natural contrast.
The scene must remain 100% identical — no redesign.
This is an optical realism edit only (lens + sensor rendering).

NON-NEGOTIABLE LOCKS
ENVIRONMENT + SCENE
- Do NOT change the environment, location, background, surfaces, furniture, décor, or table elements.
- Do NOT change lighting direction, time-of-day feel, ambience, colour temperature, or natural light character.
- Do NOT remove real mess, clutter, crumbs, imperfections, texture, scratches, or stains.

SUBJECT IDENTITY (FULL TABLE SPREAD)
- Do NOT change any items in the spread.
- No changes to shape, size, proportions, scale, angle, placement, spacing, colours, materials, packaging, labels, logos, glassware, plates, or cutlery.
- Do NOT add/remove ingredients, garnishes, liquids, steam, crumbs, etc.
- Do NOT tidy, perfect, restyle, rebalance, or food-style anything.

OBJECTS
- Do NOT add, remove, replace, invent, clone, patch, erase, AI-fill, or regenerate any objects, people, hands, utensils, napkins, packaging, or background elements.

NO RETOUCH / NO AI LOOK
- No stylising (cinematic, film, moody, vintage).
- No CGI, 3D, illustration, painterly effects.

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentPack = 'natural';
let currentExport = 'instagram';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function buildExportText(key) {
  const text = EXPORT_PROMPTS[currentPack][key];
  return text ? `\n\nEXPORT PROMPT\n${text}` : '';
}

function getFinalPrompt(promptObj, cardEl) {
  let text = promptObj.prompt;
  if (promptObj.hasHero) {
    const input = cardEl.querySelector('.hero-input');
    const val = input && input.value.trim() ? input.value.trim() : (promptObj.heroPlaceholder || 'YOUR PRODUCT');
    text = text.replaceAll('[HERO_PRODUCT]', val).replaceAll('[HERO_SUBJECT]', val).replaceAll('[FOCUS_AREA]', val);
  }
  text += buildExportText(currentExport);
  return text;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderPack() {
  const pack = PACKS[currentPack];

  document.getElementById('headerSubtitle').textContent = pack.subtitle;
  document.getElementById('promptsTitle').textContent = pack.promptsTitle;

  document.getElementById('howItWorks').innerHTML = pack.steps.map(s => `
    <div class="step">
      <div class="step-num">${s.num}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-text">${s.text}</div>
    </div>
  `).join('');

  const grid = document.getElementById('promptGrid');
  grid.innerHTML = '';

  pack.prompts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prompt-card';
    card.id = 'card-' + p.id;

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-title">${p.title}</div>
          <div class="card-subtitle">${p.subtitle}</div>
        </div>
        <div class="card-tag">${p.tag}</div>
      </div>
      <div class="card-body">
        <div class="prompt-preview">${p.description}</div>
        ${p.hasHero ? `
        <div class="hero-input-wrap">
          <label class="hero-input-label">→ Replace [${p.heroLabel}]</label>
          <input class="hero-input" type="text" placeholder="${p.heroPlaceholder}" />
        </div>` : ''}
        <button class="copy-btn" data-id="${p.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copy Full Prompt</span>
        </button>
      </div>
      <button class="expand-btn" data-id="${p.id}">
        Preview prompt
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="full-prompt" id="preview-${p.id}"></div>
    `;

    grid.appendChild(card);
  });

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const p = PACKS[currentPack].prompts.find(x => x.id === id);
      const card = document.getElementById('card-' + id);
      const text = getFinalPrompt(p, card);
      navigator.clipboard.writeText(text).then(() => {
        const span = btn.querySelector('span');
        btn.classList.add('copied');
        span.textContent = '✓ Copied!';
        showToast('Prompt copied — paste into ChatGPT');
        setTimeout(() => {
          btn.classList.remove('copied');
          span.textContent = 'Copy Full Prompt';
        }, 2500);
      });
    });
  });

  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const preview = document.getElementById('preview-' + id);
      const p = PACKS[currentPack].prompts.find(x => x.id === id);
      const card = document.getElementById('card-' + id);
      if (preview.style.display === 'block') {
        preview.style.display = 'none';
        btn.classList.remove('open');
        btn.childNodes[0].textContent = 'Preview prompt ';
      } else {
        preview.textContent = getFinalPrompt(p, card);
        preview.style.display = 'block';
        btn.classList.add('open');
        btn.childNodes[0].textContent = 'Hide prompt ';
      }
    });
  });
}

// ─── PACK SWITCH ──────────────────────────────────────────────────────────────
function switchPack(pack) {
  currentPack = pack;
  document.querySelectorAll('.pack-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.pack === pack);
  });
  renderPack();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.export-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.export-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentExport = btn.dataset.export;
    document.querySelectorAll('.full-prompt').forEach(prev => {
      if (prev.style.display === 'block') {
        const id = prev.id.replace('preview-', '');
        const p = PACKS[currentPack].prompts.find(x => x.id === id);
        const card = document.getElementById('card-' + id);
        prev.textContent = getFinalPrompt(p, card);
      }
    });
  });
});

renderPack();
</script>
